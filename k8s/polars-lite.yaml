# polars-lite — warm tier Polars + R2 aggregates service.
# Reads pre-computed hourly aggregate Parquet from R2.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: polars-lite
  namespace: tracker
  labels:
    app: polars-lite
    tier: warm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: polars-lite
  template:
    metadata:
      labels:
        app: polars-lite
        tier: warm
    spec:
      containers:
        - name: polars-lite
          image: ghcr.io/inventhq/polars-lite:latest
          ports:
            - containerPort: 3041
          envFrom:
            - configMapRef:
                name: tracker-config
            - secretRef:
                name: tracker-secrets
          env:
            - name: PORT
              value: "3041"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 3041
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 3041
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: polars-lite
  namespace: tracker
spec:
  selector:
    app: polars-lite
  ports:
    - port: 3041
      targetPort: 3041
