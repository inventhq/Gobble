# Iggy message broker — StatefulSet with persistent storage.
# Uses the official Apache Iggy Docker image.
apiVersion: v1
kind: Service
metadata:
  name: iggy
  namespace: tracker
spec:
  selector:
    app: iggy
  ports:
    - name: tcp
      port: 8090
      targetPort: 8090
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: iggy
  namespace: tracker
spec:
  serviceName: iggy
  replicas: 1
  selector:
    matchLabels:
      app: iggy
  template:
    metadata:
      labels:
        app: iggy
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      initContainers:
        - name: fetch-iggy
          image: curlimages/curl:latest
          command: ["sh", "-c"]
          args:
            - |
              # Pinned Iggy server binary — matches SDK =0.8.3-edge.1 in Cargo.toml.
              # To upgrade: download new tarball, update SHA256, test locally first.
              IGGY_SHA256="e673778119e6d79e61312751ff91df67c6d9ff93bacb7020bc44cbca4cb89cd6"
              curl -fsSL https://github.com/apache/iggy/releases/download/edge/iggy-x86_64-unknown-linux-musl-edge.tar.gz \
                -o /tmp/iggy.tar.gz && \
              echo "${IGGY_SHA256}  /tmp/iggy.tar.gz" | sha256sum -c - && \
              tar xz -C /iggy -f /tmp/iggy.tar.gz && chmod +x /iggy/iggy-server && \
              rm /tmp/iggy.tar.gz
          volumeMounts:
            - name: iggy-bin
              mountPath: /iggy
      containers:
        - name: iggy
          image: debian:trixie-slim
          command: ["/iggy/iggy-server"]
          workingDir: /iggy
          ports:
            - containerPort: 8090
              name: tcp
            - containerPort: 3000
              name: http
          env:
            - name: IGGY_CONFIG_PATH
              value: "/iggy/configs/server.toml"
            - name: IGGY_ROOT_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: tracker-config
                  key: IGGY_ROOT_USERNAME
            - name: IGGY_ROOT_PASSWORD
              valueFrom:
                configMapKeyRef:
                  name: tracker-config
                  key: IGGY_ROOT_PASSWORD
          volumeMounts:
            - name: iggy-bin
              mountPath: /iggy
            - name: iggy-data
              mountPath: /iggy/local_data
            - name: iggy-config
              mountPath: /iggy/configs
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          livenessProbe:
            tcpSocket:
              port: 8090
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            tcpSocket:
              port: 8090
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: iggy-bin
          emptyDir: {}
        - name: iggy-config
          configMap:
            name: iggy-config
  volumeClaimTemplates:
    - metadata:
        name: iggy-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
