apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: tracker

resources:
  - namespace.yaml
  - configmap.yaml
  # secrets.yaml is a TEMPLATE only — real secrets are created via kubectl in CI
  # See deploy.yaml "Create/update secrets" step
  - iggy-config.yaml
  - iggy.yaml
  - tracker-core.yaml
  - sse-gateway.yaml
  - consumers.yaml
  - polars-query.yaml
  - polars-lite.yaml
  - ai-query.yaml
  # cert-manager.yaml and ingress.yaml are applied directly (not via kustomize)
  # because they contain cross-namespace and cluster-scoped resources
