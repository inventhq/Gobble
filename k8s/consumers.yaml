# Consumer deployments — all read from Iggy events-clean topic.
# Each consumer type runs as a separate Deployment for independent scaling.

# ── webhook-consumer ─────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook-consumer
  namespace: tracker
  labels:
    app: webhook-consumer
    tier: hot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webhook-consumer
  template:
    metadata:
      labels:
        app: webhook-consumer
        tier: hot
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: webhook-consumer
          image: ghcr.io/inventhq/webhook-consumer:latest
          envFrom:
            - configMapRef:
                name: tracker-config
            - secretRef:
                name: tracker-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
