# ── r2-archiver ──────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: r2-archiver
  namespace: tracker
  labels:
    app: r2-archiver
    tier: cold
spec:
  replicas: 1
  selector:
    matchLabels:
      app: r2-archiver
  template:
    metadata:
      labels:
        app: r2-archiver
        tier: cold
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: r2-archiver
          image: ghcr.io/inventhq/r2-archiver:latest
          envFrom:
            - configMapRef:
                name: tracker-config
            - secretRef:
                name: tracker-secrets
