# ai-query — AI intelligence layer: Text-to-SQL + LanceDB vector search.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-query
  namespace: tracker
  labels:
    app: ai-query
    tier: ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-query
  template:
    metadata:
      labels:
        app: ai-query
        tier: ai
    spec:
      containers:
        - name: ai-query
          image: ghcr.io/inventhq/ai-query:latest
          ports:
            - containerPort: 3060
          envFrom:
            - configMapRef:
                name: tracker-config
            - secretRef:
                name: tracker-secrets
          env:
            - name: AI_QUERY_PORT
              value: "3060"
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3060
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 3060
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ai-query
  namespace: tracker
spec:
  selector:
    app: ai-query
  ports:
    - port: 3060
      targetPort: 3060
