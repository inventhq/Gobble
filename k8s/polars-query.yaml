# polars-query — cold tier DataFusion query service.
# Reads Delta Lake on R2, executes tenant-scoped SQL.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: polars-query
  namespace: tracker
  labels:
    app: polars-query
    tier: cold
spec:
  replicas: 1
  selector:
    matchLabels:
      app: polars-query
  template:
    metadata:
      labels:
        app: polars-query
        tier: cold
    spec:
      containers:
        - name: polars-query
          image: ghcr.io/inventhq/polars-query:latest
          ports:
            - containerPort: 3040
          envFrom:
            - configMapRef:
                name: tracker-config
            - secretRef:
                name: tracker-secrets
          env:
            - name: PORT
              value: "3040"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 3040
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 3040
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: polars-query
  namespace: tracker
spec:
  selector:
    app: polars-query
  ports:
    - port: 3040
      targetPort: 3040
